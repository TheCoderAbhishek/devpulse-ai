<div class="min-h-screen text-slate-100">
  <div class="pointer-events-none fixed inset-0 -z-10 soft-grid-bg opacity-40"></div>

  <div
    class="pointer-events-none fixed left-0 top-0 -z-10 h-96 w-96 rounded-full bg-blue-500/20 blur-3xl"
  ></div>

  <div
    class="pointer-events-none fixed right-0 top-20 -z-10 h-96 w-96 rounded-full bg-violet-500/20 blur-3xl"
  ></div>

  <div class="flex min-h-screen">
    <aside
      class="hidden w-80 border-r border-white/10 bg-slate-950/70 px-5 py-6 backdrop-blur-2xl lg:block"
    >
      <div class="flex items-center gap-3">
        <div
          class="flex h-11 w-11 items-center justify-center rounded-2xl bg-linear-to-br from-blue-500 via-violet-500 to-cyan-400 shadow-lg shadow-blue-950/40"
        >
          <lucide-angular [img]="Sparkles" class="h-5 w-5 text-white" />
        </div>

        <div>
          <p class="text-base font-bold tracking-tight text-white">DevPulse AI</p>
          <p class="text-xs text-slate-400">Developer Intelligence</p>
        </div>
      </div>

      <nav class="mt-8 space-y-2">
        <a
          routerLink="/dashboard"
          routerLinkActive="border-blue-500/60 bg-blue-500/15 text-white shadow-lg shadow-blue-950/20"
          class="group flex items-center gap-3 rounded-2xl border border-transparent px-4 py-3 text-sm font-medium text-slate-400 transition hover:border-white/10 hover:bg-white/5 hover:text-white"
        >
          <lucide-angular [img]="Home" class="h-4 w-4" />
          Dashboard
        </a>

        <a
          routerLink="/github"
          routerLinkActive="border-blue-500/60 bg-blue-500/15 text-white shadow-lg shadow-blue-950/20"
          class="group flex items-center gap-3 rounded-2xl border border-transparent px-4 py-3 text-sm font-medium text-slate-400 transition hover:border-white/10 hover:bg-white/5 hover:text-white"
        >
          <lucide-angular [img]="Github" class="h-4 w-4" />
          GitHub Analytics
        </a>

        <a
          routerLink="/watchlist"
          routerLinkActive="border-blue-500/60 bg-blue-500/15 text-white shadow-lg shadow-blue-950/20"
          class="group flex items-center gap-3 rounded-2xl border border-transparent px-4 py-3 text-sm font-medium text-slate-400 transition hover:border-white/10 hover:bg-white/5 hover:text-white"
        >
          <lucide-angular [img]="Bookmark" class="h-4 w-4" />
          Watchlist
        </a>

        <a
          routerLink="/settings"
          routerLinkActive="border-blue-500/60 bg-blue-500/15 text-white shadow-lg shadow-blue-950/20"
          class="group flex items-center gap-3 rounded-2xl border border-transparent px-4 py-3 text-sm font-medium text-slate-400 transition hover:border-white/10 hover:bg-white/5 hover:text-white"
        >
          <lucide-angular [img]="Settings" class="h-4 w-4" />
          Settings
        </a>
      </nav>

      <div
        class="mt-8 rounded-3xl border border-blue-500/20 bg-blue-500/10 p-4 shadow-lg shadow-blue-950/20"
      >
        <div class="flex items-center gap-2 text-blue-200">
          <lucide-angular [img]="BarChart3" class="h-4 w-4" />
          <p class="text-sm font-semibold">Portfolio-grade app</p>
        </div>

        <p class="mt-2 text-xs leading-5 text-slate-400">
          Angular, RxJS, IndexedDB, public APIs, Azure-ready deployment.
        </p>
      </div>
    </aside>

    <main class="flex min-h-screen min-w-0 flex-1 flex-col">
      <app-offline-banner />
      <app-rate-limit-banner />
      <app-global-error-panel />

      <header
        class="sticky top-0 z-30 border-b border-white/10 bg-slate-950/70 px-4 py-4 backdrop-blur-2xl sm:px-6"
      >
        <div class="flex items-center justify-between gap-4">
          <div class="min-w-0">
            <p class="text-xs font-semibold uppercase tracking-[0.28em] text-blue-300">
              DevPulse AI
            </p>

            <h1 class="mt-1 truncate text-lg font-bold tracking-tight text-white sm:text-xl">
              Open-source intelligence workspace
            </h1>
          </div>

          <div class="flex shrink-0 items-center gap-3">
            <app-theme-toggle />

            <a
              routerLink="/github"
              class="hidden rounded-2xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-blue-950/30 transition hover:-translate-y-0.5 hover:bg-blue-500 hover:shadow-blue-900/40 active:translate-y-0 sm:inline-flex"
            >
              Analyze Repository
            </a>
          </div>
        </div>

        <nav class="mt-4 grid grid-cols-4 gap-2 lg:hidden">
          <a
            routerLink="/dashboard"
            routerLinkActive="bg-blue-600 text-white"
            class="flex items-center justify-center rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-slate-300 transition hover:bg-white/10"
            aria-label="Dashboard"
          >
            <lucide-angular [img]="Home" class="h-4 w-4" />
          </a>

          <a
            routerLink="/github"
            routerLinkActive="bg-blue-600 text-white"
            class="flex items-center justify-center rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-slate-300 transition hover:bg-white/10"
            aria-label="GitHub Analytics"
          >
            <lucide-angular [img]="Github" class="h-4 w-4" />
          </a>

          <a
            routerLink="/watchlist"
            routerLinkActive="bg-blue-600 text-white"
            class="flex items-center justify-center rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-slate-300 transition hover:bg-white/10"
            aria-label="Watchlist"
          >
            <lucide-angular [img]="Bookmark" class="h-4 w-4" />
          </a>

          <a
            routerLink="/settings"
            routerLinkActive="bg-blue-600 text-white"
            class="flex items-center justify-center rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-slate-300 transition hover:bg-white/10"
            aria-label="Settings"
          >
            <lucide-angular [img]="Settings" class="h-4 w-4" />
          </a>
        </nav>
      </header>

      <section class="flex-1 px-4 py-6 sm:px-6 lg:px-8">
        <div class="page-enter mx-auto max-w-7xl">
          <router-outlet />
        </div>
      </section>
    </main>
  </div>
</div>

<app-toast-container />
<app-confirm-dialog />
