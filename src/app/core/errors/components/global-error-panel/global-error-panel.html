@if (errorLogService.publicError().hasError) {
  <section class="border-b border-red-900 bg-red-950 px-6 py-4 text-red-100">
    <div class="flex flex-col justify-between gap-3 lg:flex-row lg:items-center">
      <div>
        <p class="font-semibold">
          {{ errorLogService.publicError().title }}
        </p>

        <p class="mt-1 text-sm leading-6">
          {{ errorLogService.publicError().message }}
        </p>

        @if (errorLogService.publicError().errorId) {
          <p class="mt-1 text-xs text-red-300">
            Error ID: {{ errorLogService.publicError().errorId }}
          </p>
        }
      </div>

      <button
        type="button"
        class="rounded-xl border border-red-700 px-4 py-2 text-sm font-semibold text-red-100 transition hover:bg-red-900"
        (click)="errorLogService.dismissPublicError()"
      >
        Dismiss
      </button>
    </div>
  </section>
}
