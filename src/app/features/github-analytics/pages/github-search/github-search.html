<div class="space-y-6">
  <section>
    <p class="text-sm font-medium text-blue-400">GitHub Analytics</p>
    <h1 class="mt-2 text-3xl font-bold tracking-tight text-white">Repository Intelligence</h1>
    <p class="mt-3 max-w-3xl text-slate-400">
      Search, compare, and evaluate open-source repositories using GitHub public APIs. API
      orchestration and caching will be implemented fully on the frontend.
    </p>
  </section>

  <section class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
    <label for="repositorySearch" class="text-sm font-medium text-slate-300">
      Repository Search
    </label>

    <div class="mt-3 flex flex-col gap-3 md:flex-row">
      <input
        id="repositorySearch"
        type="text"
        placeholder="Search repositories, e.g. angular, rxjs, tailwind"
        class="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30"
      />

      <button
        type="button"
        class="rounded-xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-blue-500"
      >
        Search
      </button>
    </div>

    <p class="mt-3 text-xs text-slate-500">
      Search functionality will be connected in the next API architecture phase.
    </p>
  </section>
</div>
