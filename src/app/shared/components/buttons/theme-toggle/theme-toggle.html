<button
  type="button"
  class="group inline-flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-sm font-semibold text-slate-200 shadow-sm backdrop-blur transition hover:-translate-y-0.5 hover:border-blue-500/70 hover:bg-blue-500/10 active:translate-y-0"
  [attr.aria-label]="'Current theme: ' + themeService.themeMode()"
  (click)="cycleTheme()"
>
  @if (themeService.themeMode() === 'system') {
    <lucide-angular [img]="Monitor" class="h-4 w-4 text-blue-300" />
    <span class="hidden sm:inline">System</span>
  }

  @if (themeService.themeMode() === 'dark') {
    <lucide-angular [img]="Moon" class="h-4 w-4 text-indigo-300" />
    <span class="hidden sm:inline">Dark</span>
  }

  @if (themeService.themeMode() === 'light') {
    <lucide-angular [img]="Sun" class="h-4 w-4 text-amber-300" />
    <span class="hidden sm:inline">Light</span>
  }
</button>
