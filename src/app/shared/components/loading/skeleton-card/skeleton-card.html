<div class="animate-pulse rounded-2xl border border-slate-800 bg-slate-900 p-5">
  <div class="h-5 w-1/3 rounded bg-slate-800"></div>

  @for (row of [].constructor(rows); track $index) {
    <div
      class="mt-4 h-4 rounded bg-slate-800"
      [class.w-2/3]="$index % 2 === 0"
      [class.w-1/2]="$index % 2 !== 0"
    ></div>
  }
</div>
