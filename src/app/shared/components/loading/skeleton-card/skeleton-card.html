<div class="premium-card animate-pulse rounded-3xl p-5">
  <div class="flex items-center gap-4">
    <div class="h-12 w-12 rounded-2xl bg-slate-700/60"></div>

    <div class="flex-1">
      <div class="h-5 w-1/3 rounded bg-slate-700/60"></div>
      <div class="mt-3 h-4 w-1/2 rounded bg-slate-800/70"></div>
    </div>
  </div>

  @for (row of [].constructor(rows); track $index) {
    <div
      class="mt-4 h-4 rounded bg-slate-800/70"
      [class.w-2/3]="$index % 2 === 0"
      [class.w-1/2]="$index % 2 !== 0"
    ></div>
  }

  <div class="mt-5 grid grid-cols-2 gap-3 sm:grid-cols-4">
    <div class="h-16 rounded-2xl bg-slate-800/70"></div>
    <div class="h-16 rounded-2xl bg-slate-800/70"></div>
    <div class="h-16 rounded-2xl bg-slate-800/70"></div>
    <div class="h-16 rounded-2xl bg-slate-800/70"></div>
  </div>
</div>
