@if (confirmDialog.state().open) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/75 px-4 backdrop-blur-sm"
  >
    <section
      role="dialog"
      aria-modal="true"
      class="premium-card w-full max-w-lg rounded-3xl p-6 shadow-2xl"
    >
      <h2 class="text-xl font-black premium-title">
        {{ confirmDialog.state().title }}
      </h2>

      <p class="mt-3 text-sm leading-6 premium-muted">
        {{ confirmDialog.state().message }}
      </p>

      <div class="mt-6 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
        <button type="button" class="premium-secondary-button" (click)="confirmDialog.cancel()">
          {{ confirmDialog.state().cancelLabel }}
        </button>

        <button
          type="button"
          class="rounded-2xl px-5 py-3 text-sm font-bold text-white shadow-lg transition hover:-translate-y-0.5 active:translate-y-0"
          [class.bg-blue-600]="confirmDialog.state().tone === 'default'"
          [class.hover:bg-blue-500]="confirmDialog.state().tone === 'default'"
          [class.shadow-blue-950]="confirmDialog.state().tone === 'default'"
          [class.bg-amber-600]="confirmDialog.state().tone === 'warning'"
          [class.hover:bg-amber-500]="confirmDialog.state().tone === 'warning'"
          [class.shadow-amber-950]="confirmDialog.state().tone === 'warning'"
          [class.bg-red-600]="confirmDialog.state().tone === 'danger'"
          [class.hover:bg-red-500]="confirmDialog.state().tone === 'danger'"
          [class.shadow-red-950]="confirmDialog.state().tone === 'danger'"
          (click)="confirmDialog.accept()"
        >
          {{ confirmDialog.state().confirmLabel }}
        </button>
      </div>
    </section>
  </div>
}
