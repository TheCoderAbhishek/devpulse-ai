@if (confirmDialog.state().open) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 px-4">
    <section
      role="dialog"
      aria-modal="true"
      class="w-full max-w-lg rounded-2xl border border-slate-800 bg-slate-950 p-6 shadow-2xl"
    >
      <h2 class="text-xl font-semibold text-white">
        {{ confirmDialog.state().title }}
      </h2>

      <p class="mt-3 text-sm leading-6 text-slate-400">
        {{ confirmDialog.state().message }}
      </p>

      <div class="mt-6 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
        <button
          type="button"
          class="rounded-xl border border-slate-700 px-5 py-3 text-sm font-semibold text-slate-200 transition hover:bg-slate-800"
          (click)="confirmDialog.cancel()"
        >
          {{ confirmDialog.state().cancelLabel }}
        </button>

        <button
          type="button"
          class="rounded-xl px-5 py-3 text-sm font-semibold text-white transition"
          [class.bg-blue-600]="confirmDialog.state().tone === 'default'"
          [class.hover:bg-blue-500]="confirmDialog.state().tone === 'default'"
          [class.bg-amber-600]="confirmDialog.state().tone === 'warning'"
          [class.hover:bg-amber-500]="confirmDialog.state().tone === 'warning'"
          [class.bg-red-600]="confirmDialog.state().tone === 'danger'"
          [class.hover:bg-red-500]="confirmDialog.state().tone === 'danger'"
          (click)="confirmDialog.accept()"
        >
          {{ confirmDialog.state().confirmLabel }}
        </button>
      </div>
    </section>
  </div>
}
