<div
  class="pointer-events-none fixed right-4 top-4 z-50 flex w-[calc(100vw-2rem)] max-w-md flex-col gap-3"
  aria-live="polite"
  aria-atomic="true"
>
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="pointer-events-auto rounded-2xl border p-4 shadow-2xl backdrop-blur transition"
      [class.border-emerald-700]="isSuccess(toast.type)"
      [class.bg-emerald-950]="isSuccess(toast.type)"
      [class.text-emerald-100]="isSuccess(toast.type)"
      [class.border-red-800]="isError(toast.type)"
      [class.bg-red-950]="isError(toast.type)"
      [class.text-red-100]="isError(toast.type)"
      [class.border-amber-700]="isWarning(toast.type)"
      [class.bg-amber-950]="isWarning(toast.type)"
      [class.text-amber-100]="isWarning(toast.type)"
      [class.border-blue-700]="isInfo(toast.type)"
      [class.bg-blue-950]="isInfo(toast.type)"
      [class.text-blue-100]="isInfo(toast.type)"
    >
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="text-sm font-semibold">
            {{ toast.title }}
          </p>

          @if (toast.message) {
            <p class="mt-1 text-sm opacity-90">
              {{ toast.message }}
            </p>
          }
        </div>

        <button
          type="button"
          class="rounded-lg px-2 py-1 text-xs opacity-80 transition hover:bg-white/10 hover:opacity-100"
          [attr.aria-label]="'Dismiss ' + toast.title"
          (click)="toastService.dismiss(toast.id)"
        >
          ✕
        </button>
      </div>
    </div>
  }
</div>
