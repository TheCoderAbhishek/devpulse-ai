@if (limitedProviders().length > 0) {
  <div
    role="alert"
    class="border-b border-red-500/30 bg-red-950/75 px-6 py-3 text-sm text-red-100 backdrop-blur-xl"
  >
    <span class="font-bold">Rate limit warning:</span>
    Some providers are currently limited.

    @for (provider of limitedProviders(); track provider.provider) {
      <span class="ml-2 rounded-full border border-red-500/30 bg-red-500/10 px-2 py-1 text-xs">
        {{ provider.provider }}
        @if (provider.resetAt) {
          · resets {{ provider.resetAt }}
        }
      </span>
    }
  </div>
}
