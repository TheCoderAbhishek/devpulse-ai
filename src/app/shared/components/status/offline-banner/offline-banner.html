@if (!offlineStatus.isOnline()) {
  <div
    role="status"
    class="border-b border-amber-500/30 bg-amber-950/70 px-6 py-3 text-sm text-amber-100 backdrop-blur-xl"
  >
    <span class="font-bold">Offline mode:</span>
    Network is unavailable. Cached data may still be shown from IndexedDB.
  </div>
}
