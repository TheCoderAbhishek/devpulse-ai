<section class="rounded-2xl border border-red-900 bg-red-950/40 p-6">
  <h2 class="text-lg font-semibold text-red-300">
    {{ title }}
  </h2>

  @if (message) {
    <p class="mt-2 text-sm leading-6 text-red-100">
      {{ message }}
    </p>
  }

  <button
    type="button"
    class="mt-4 rounded-xl bg-red-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-red-500"
    (click)="onRetry()"
  >
    {{ retryLabel }}
  </button>
</section>
